{% extends 'appointments/base.html' %}

{% block title %}Password Reset Complete - HopeLife Clinic{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-premium p-4 p-md-5 text-center">
                <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle p-3 mb-4 mx-auto" style="width: 80px; height: 80px;">
                    <i class="fa-solid fa-circle-check fs-1"></i>
                </div>
                
                <h3 class="fw-bold mb-3">Password Restored!</h3>
                <p class="text-muted mb-4">
                    Your password has been securely updated and stored. You may now log in to the portal using your new credentials.
                </p>
                
                <a href="{% url 'login' %}" class="btn btn-primary-custom w-100 py-2">
                    <i class="fa-solid fa-right-to-bracket me-2"></i> Log In Portal
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
