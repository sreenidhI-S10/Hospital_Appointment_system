{% extends 'appointments/base.html' %}

{% block title %}Form Expired - HopeLife Clinic{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card card-premium p-4 p-md-5 text-center">
                <div class="d-inline-flex align-items-center justify-content-center bg-warning bg-opacity-10 text-warning rounded-circle p-3 mx-auto mb-3" style="width: 70px; height: 70px;">
                    <i class="fa-solid fa-rotate fs-2"></i>
                </div>
                <h3 class="fw-bold">This form needs to be refreshed</h3>
                <p class="text-muted mb-4">
                    Your security token expired or changed. Please reload the form and submit it again.
                </p>
                <div class="d-flex flex-column flex-sm-row justify-content-center gap-2">
                    <a href="{{ request.path }}" class="btn btn-primary-custom px-4">
                        <i class="fa-solid fa-rotate-right me-2"></i> Reload Form
                    </a>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary px-4">
                        <i class="fa-solid fa-house me-2"></i> Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
